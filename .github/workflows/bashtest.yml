name: Shell Testing

on: [push, pull_request]

jobs:
  lint:
    # Note: the old 'os' matrix entry was unused (runs-on was hardcoded)
    # and 'debian-latest' is not a valid GitHub-hosted runner label, so
    # the matrix only varies the shell under test now.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shell: [bash, zsh, fish]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck zsh fish

    - name: Test Bash scripts
      if: matrix.shell == 'bash'
      run: |
        shellcheck -S error -f gcc *.sh .bashrc
        bash -n .bashrc
        bash -n .bash_aliases
        bash -n .bashrc_help
        for f in *.sh; do bash -n "$f"; done

    - name: Test Zsh scripts
      if: matrix.shell == 'zsh'
      run: |
        zsh -n .zshrc
        zsh -n .zshrc_help

    - name: Test Fish scripts
      if: matrix.shell == 'fish'
      run: |
        fish --no-execute config.fish
        fish --no-execute fish_help

    - name: Test installation (dry run)
      run: |
        # Add installation test here
        echo "Installation test placeholder"
